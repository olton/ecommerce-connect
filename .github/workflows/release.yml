name: Build and Release Assets

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (latest)
        uses: actions/setup-node@v4
        with:
          node-version: current
          cache: npm

      - name: Install i18n build tools (PHP, WP-CLI, gettext)
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y php-cli php-mbstring php-xml gettext curl

          curl -fsSL -o wp-cli.phar https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          chmod +x wp-cli.phar
          sudo mv wp-cli.phar /usr/local/bin/wp

      - name: Verify i18n toolchain
        shell: bash
        run: |
          set -euo pipefail
          php -v
          wp --info
          msgmerge --version
          msgfmt --version

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Collect ZIP assets from stores/*/dist
        id: collect_assets
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          files=(stores/*/dist/*.zip)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No zip files found in stores/*/dist. Continuing without assets."
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_files=true" >> "$GITHUB_OUTPUT"

          {
            echo "files<<EOF"
            for file in "${files[@]}"; do
              echo "$file"
            done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release and upload assets
        if: steps.collect_assets.outputs.has_files == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: assets-${{ github.run_number }}
          name: Assets Build #${{ github.run_number }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: ${{ steps.collect_assets.outputs.files }}
